name: Soroban Contracts CI

on:
  push:
    paths:
      - 'contract/**'
  pull_request:
    paths:
      - 'contract/**'

jobs:
  build_and_test:
    name: Build, Test, and Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contract
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Check formatting (fmt)
        run: cargo fmt --check

      - name: Lint (clippy)
        run: cargo clippy --workspace -- -D warnings

      - name: Build contracts
        run: cargo build --target wasm32-unknown-unknown --release -p arena -p factory -p payout -p staking

      - name: Run tests
        run: cargo test --workspace

      - name: Check WASM size
        run: |
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            SIZE=$(stat -c%s "$wasm")
            echo "Size of $wasm: $SIZE bytes"
            if [ "$SIZE" -gt 65536 ]; then
              echo "Error: $wasm exceeds 64KB limit ($SIZE bytes)"
              exit 1
            fi
          done
